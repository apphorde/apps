<template component="x-pomodoro" shadow-dom="open">
  <link rel="component" href="https://sodium.static.apphor.de/lucide-icon.html" />
  <link rel="stylesheet" href="https://wdn.homebots.io/tailwind.css" />
  <style>
    .pomodoro {
      background-color: var(--pomodoro-bg, #629438);
      color: var(--pomodoro-color);
    }

    .text-tomato {
      color: var(--pomodoro-color, white);
    }

    .bg-tomato {
      background-color: var(--pomodoro-bg-running, #d13934);
    }

    .button-solid svg {
      fill: currentColor;
    }
  </style>
  <div class="flex space-y-6 items-center justify-center h-20 pomodoro text-tomato">
    <div class="text-5xl font-bold" class-hidden="!running">{{ padLeft(minutesLeft) }}:{{ padLeft(secondsLeft) }}</div>
    <div class="flex items-center justify-center" class-hidden="running">
      <input
        class="text-5xl font-bold w-16 rounded-lg bg-transparent text-right text-tomato"
        bind-value="requestedTime"
        on-input="setRequestedTime($event.target.value)"
      />
      <span class="text-5xl font-bold">:00</span>
    </div>
  </div>
  <div class="w-2/3 mx-auto rounded-full border border-white" class-opacity-0="!running">
    <span style-width="progress + '%'" class="h-2 block bg-white opacity-50 rounded-full"></span>
  </div>
  <div class="flex items-center justify-center gap-4 mt-4">
    <button
      on-click="onReset()"
      class-hidden="!running"
      class="flex items-center justify-center rounded-full font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 w-12 h-12 p-2 text-tomato"
    >
      <lucide-icon icon="history"></lucide-icon>
      <span class="sr-only">Reset</span>
    </button>
    <button
      on-click="onStart()"
      class-bg-tomato="running"
      class-bg-green-700="!running"
      class="flex items-center justify-center rounded-full font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 h-16 w-16 p-4 text-tomato button-solid"
    >
      <lucide-icon bind-icon="running ? 'square' : 'play'" size="24"></lucide-icon>
      <span class="sr-only">Toggle</span>
    </button>

    <button
      on-click="onPause()"
      class-hidden="!running"
      class="flex items-center justify-center rounded-full font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 w-12 h-12 p-2 text-tomato button-solid"
    >
      <lucide-icon bind-icon="paused ? 'play' : 'pause'"></lucide-icon>
      <span class="sr-only">Pause/Continue</span>
    </button>
  </div>
  <script setup>
    import { computed, ref } from "@li3/web";

    export default function () {
      let timer = 0;
      let wakeLock;
      const initialTime = 25;
      const running = ref(false);
      const paused = ref(false);
      const requestedTime = ref(String(initialTime));
      const timeLeft = ref(initialTime * 60);
      const minutesLeft = computed(() => Math.floor(timeLeft.value / 60));
      const secondsLeft = computed(() => Math.floor(timeLeft.value % 60));
      const getRequestedTime = () => parseInt(requestedTime.value) || initialTime;
      const padLeft = (n) => String(n).padStart(2, "0");
      const progress = computed(() => {
        const left = timeLeft.value;
        const requested = requestedTime.value;

        if (running.value) {
          return Math.floor(100 * (left / (Number(requested) * 60)));
        }

        return 0;
      });

      function setRequestedTime(t) {
        requestedTime.value = t;
      }

      function onStop() {
        clearInterval(timer);
        running.value = false;
        paused.value = false;
        wakeLock?.release();
      }

      function onPause() {
        paused.value = !paused.value;
      }

      async function onStart() {
        if (running.value) {
          onStop();
          return;
        }

        timeLeft.value = getRequestedTime() * 60;
        timer = setInterval(onTick, 1000);
        running.value = true;

        if (Notification.permission !== "granted") {
          Notification.requestPermission();
        }

        wakeLock = await navigator.wakeLock.request("screen");
      }

      function onReset() {
        timeLeft.value = getRequestedTime() * 60;
      }

      function onTick() {
        if (paused.value) return;

        timeLeft.value -= 1;

        if (timeLeft.value <= 0) {
          onStop();
          notify();
        }
      }

      function timeIsUp() {
        new Notification("Pomodoro", {
          body: "Time is up!",
          icon: "/assets/icon.svg",
        });
      }

      function notify() {
        if (Notification.permission === "denied") {
          return;
        }

        Notification.requestPermission().then((permission) => {
          if (permission === "granted") {
            timeIsUp();
          }
        });
      }

      return {
        running,
        paused,
        requestedTime,
        timeLeft,
        minutesLeft,
        secondsLeft,
        progress,
        setRequestedTime,
        onStart,
        onPause,
        onReset,
        padLeft,
      };
    }
  </script>
</template>
