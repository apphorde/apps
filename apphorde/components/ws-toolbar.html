<template component="ws-toolbar">
  <script setup>
    import { ref, computed, watch, onInit, defineProp } from "@li3/web";
    import useStore, { storeToRefs } from '@app/store.mjs';

    export default function () {
      defineProp('applets');
      const { zoom } = storeToRefs(useStore());

      const toolbarCollapsed = ref(
        (localStorage.getItem("toolbarCollapsed") || "") === "true",
      );

      const instructionsCollapsed = ref(
        (localStorage.getItem("helpCollapsed") || "") === "true",
      );

      watch(toolbarCollapsed, (value) =>
        localStorage.setItem("toolbarCollapsed", value),
      );
      watch(instructionsCollapsed, (value) =>
        localStorage.setItem("helpCollapsed", value),
      );

      function toggleToolbar() {
        toolbarCollapsed.value = !toolbarCollapsed.value;
      }

      function toggleInstructions() {
        instructionsCollapsed.value = !instructionsCollapsed.value;
      }

      return {
        zoom,
        toolbarCollapsed,
        instructionsCollapsed,
        toggleInstructions,
        toggleToolbar,
      };
    }
  </script>
  <div
    class="absolute top-4 left-4 z-50 flex items-center gap-2 rounded-lg bg-gray-800 p-2 shadow-lg bg-white"
  >
    <button
      class="text-gray-400 hover:text-black transition-colors px-1"
      bind-title="toolbarCollapsed ? 'Expand toolbar' : 'Collapse toolbar'"
      on-click="toggleToolbar()"
    >
      {{ toolbarCollapsed ? "▶" : "◀" }}
    </button>
    <div
      class="items-center gap-2"
      class-flex="!toolbarCollapsed"
      class-hidden="toolbarCollapsed"
    >
      <span class="px-2 text-sm text-gray-400"
        >Zoom: {{ Math.round(zoom * 100) }}%</span
      >
      <button
        on-click="resetView()"
        class="rounded bg-gray-200 px-3 py-1.5 text-sm hover:text-black text-gray-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <lucide-icon icon="scan-search" title="Reset View"></lucide-icon>
      </button>
      <button
        on-click="showAllApplets()"
        bind-disabled="!applets?.length"
        class="rounded bg-gray-200 px-3 py-1.5 text-sm hover:text-black text-gray-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <lucide-icon icon="layout-template" title="Show All"></lucide-icon>
      </button>
      <button
        on-click="tileApplets()"
        bind-disabled="!applets?.length"
        class="rounded bg-gray-200 px-3 py-1.5 text-sm hover:text-black text-gray-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <lucide-icon icon="layout-grid" title="Tile"></lucide-icon>
      </button>
      <button
        on-click="clearAll()"
        class="rounded bg-gray-200 px-3 py-1.5 text-sm hover:text-black text-gray-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <lucide-icon icon="copy-x"></lucide-icon>
      </button>
    </div>
  </div>

  <!-- Instructions -->
  <div
    class="absolute top-4 right-4 z-50 rounded-lg bg-gray-800 shadow-lg bg-white"
  >
    <button
      on-click="toggleInstructions()"
      class="flex items-center gap-2 p-3 text-gray-400 hover:text-white transition-colors w-full"
      title="Show instructions"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        style="transition: transform 0.2s"
      >
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
        <path d="M12 17h.01"></path>
      </svg>
      <span class="text-sm font-medium">Help</span>
    </button>
    <div
      class="px-3 pb-3 text-xs text-gray-400 max-w-xs"
      class-hidden="instructionsCollapsed"
    >
      <ul class="space-y-0.5">
        <li>Click & drag to draw an applet area</li>
        <li>Ctrl/Cmd + drag to pan</li>
        <li>Scroll to zoom</li>
        <li>Min size: 100x100px</li>
        <li>Drag title bar to move applets</li>
        <li>Drag edges/corners to resize</li>
      </ul>
    </div>
  </div>
</template>
