<template component="ws-applet" shadow-dom="open">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
  />

  <div
    class="relative rounded-lg border-2 border-gray-600 shadow-xl overflow-scroll flex flex-col bg-white h-full"
    on-click="onFocus()"
  >
    <template for="e of edges">
      <div
        bind-class="e.cls"
        on-pointerdown.stop.prevent="onResizeStart({ clientX: $event.clientX, clientY: $event.clientY, edge: e.edge })"
        on-pointerup.stop.prevent="onResizeStop({ clientX: $event.clientX, clientY: $event.clientY, edge: e.edge })"
      ></div>
    </template>
    <div
      class="flex items-center justify-between bg-gray-700 px-3 py-2 shrink-0 cursor-move select-none"
      xon-pointerdown.stop="onDragStart({ clientX: $event.clientX, clientY: $event.clientY })"
      xon-pointerup.stop="onDragStop()"
    >
      <!-- content -->
      <template if="!applet.app">
        <span class="text-sm text-white truncate pointer-events-none">
          Select an Applet
        </span>
      </template>
      <template if="applet.app">
        <span class="text-sm text-white truncate pointer-events-none">
          {{applet.app.icon}} {{applet.app.name}} - {{ title }}
        </span>
      </template>

      <button
        class="ml-2 text-gray-400 hover:text-red-400 transition-colors text-lg leading-none"
        on-click.stop="onDelete()"
      >
        &times;
      </button>
    </div>
    <div class="flex-1 overflow-hidden">
      <!-- content -->
      <template if="!applet.app">
        <div class="h-full overflow-auto p-3 bg-gray-900">
          <div class="grid grid-cols-4 gap-2 text-white">
            <template for="app of APPLETS">
              <button
                class="flex flex-col items-center gap-1.5 p-2 rounded-lg hover:bg-zinc-700/50 transition-colors group"
                on-click="onSelect(app)"
              >
                <span
                  class="text-2xl group-hover:scale-110 transition-transform"
                  >{{app.icon}}</span
                >
                <span
                  class="text-xs text-zinc-300 text-center leading-tight truncate w-full"
                  >{{app.name}}</span
                >
              </button>
            </template>
          </div>
        </div>
      </template>
      <template if="applet.app">
        <iframe
          class="w-full h-full border-0"
          bind-src="applet.app.url"
          bind-title="applet.name"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
        ></iframe>
      </template>
    </div>
  </div>
  <script setup src="/components/ws-applet.mjs"></script>
</template>
