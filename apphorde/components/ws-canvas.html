<template component="ws-canvas">
  <script setup lang="ts">
    import { ref, computed, defineEvent } from "@li3/web";
    import useStore, { storeToRefs } from "@app/store.mjs";

    export default function () {
      const store = useStore();
      const { panX, panY, zoom } = storeToRefs(store);
      const onMove = defineEvent("move");
      const onDraw = defineEvent("draw");
      const zoomSize = computed(() => zoom.value * 20);
      const isDrawing = ref(false);
      const drawStartX = ref(0);
      const drawStartY = ref(0);
      const drawCurrentX = ref(0);
      const drawCurrentY = ref(0);
      const isPanning = ref(false);
      const panStartX = ref(0);
      const panStartY = ref(0);
      const drawPreviewCoords = computed(() => {
        const x = Math.min(drawStartX.value, drawCurrentX.value);
        const y = Math.min(drawStartY.value, drawCurrentY.value);
        const width = Math.abs(drawCurrentX.value - drawStartX.value);
        const height = Math.abs(drawCurrentY.value - drawStartY.value);

        return { x, y, width, height };
      });

      function onPointerDown(e) {
        if (!e.target.classList.contains("canvas")) return;

        if (e.button === 1 || e.ctrlKey || e.metaKey) {
          isPanning.value = true;
          panStartX.value = e.clientX - panX.value;
          panStartY.value = e.clientY - panY.value;
          return;
        }

        if (e.button === 0) {
          const pos = store.screenToCanvas(e.clientX, e.clientY);
          isDrawing.value = true;
          drawStartX.value = pos.x;
          drawStartY.value = pos.y;
          drawCurrentX.value = pos.x;
          drawCurrentY.value = pos.y;
          return;
        }
      }

      function onPointerMove(e) {
        if (isPanning.value) {
          panX.value = e.clientX - panStartX.value;
          panY.value = e.clientY - panStartY.value;
          return;
        }

        if (isDrawing.value) {
          const pos = store.screenToCanvas(e.clientX, e.clientY);
          drawCurrentX.value = pos.x;
          drawCurrentY.value = pos.y;
          return;
        }

        onMove({ x: e.clientX, y: e.clientY });
      }

      function onPointerUp() {
        if (isDrawing.value) {
          const width = Math.abs(drawCurrentX.value - drawStartX.value);
          const height = Math.abs(drawCurrentY.value - drawStartY.value);

          if (width >= 100 && height >= 100) {
            onDraw({
              x: Math.min(drawStartX.value, drawCurrentX.value),
              y: Math.min(drawStartY.value, drawCurrentY.value),
              width,
              height
            });
          }
        }

        isDrawing.value = false;
        isPanning.value = false;

      }

      function onWheel(e) {
        const delta = e.deltaY > 0 ? 0.09 : 1.01;
        const prevZoom = zoom.value;
        const newZoom = Math.min(Math.max(prevZoom * delta, 0.1), 5);

        const rect = canvas.value.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        panX.value = mouseX - ((mouseX - panX.value) / prevZoom) * newZoom;
        panY.value = mouseY - ((mouseY - panY.value) / prevZoom) * newZoom;
        zoom.value = newZoom;
      }

      return {
        zoom,
        zoomSize,
        panX,
        panY,
        isDrawing,
        drawStartX,
        drawStartY,
        drawCurrentX,
        drawCurrentY,
        isPanning,
        panStartX,
        panStartY,
        drawPreviewCoords,

        onPointerDown,
        onPointerMove,
        onPointerUp,
        onWheel,
      };
    }
  </script>
  <style>
    .canvas {
      background-image: radial-gradient(circle, #8f8fa5 1px, transparent 1px);
      background-size: 20px 20px;
      background-position: 0px 0px;
    }

    .transform-origin {
      transform-origin: 0 0;
    }
  </style>

  <div
    ref="canvas"
    class="h-full w-full cursor-crosshair canvas"
    bind-style="{
      'background-size': `${zoomSize}px ${zoomSize}px`,
      'background-position': `${panX}px ${panY}px`
    }"
    on-pointerdown="onPointerDown($event)"
    on-pointermove="onPointerMove($event)"
    on-pointerup="onPointerUp($event)"
    on-wheel.prevent.stop="onWheel($event)"
  >
    <!-- Transform container -->
    <div
      class="transform-origin"
      style-transform="`translate(${panX}px, ${panY}px) scale(${zoom})`"
    >
      <!-- Drawing preview -->
      <div
        class="absolute border-2 border-dashed border-blue-500 bg-blue-500/20 rounded-lg pointer-events-none"
        class-hidden="!isDrawing"
        bind-style="{
          left: `${drawPreviewCoords.x}px`,
          top: `${drawPreviewCoords.y}px`,
          width: `${drawPreviewCoords.width}px`,
          height: `${drawPreviewCoords.height}px`,
        }"
      >
        <span
          class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-blue-300 text-sm whitespace-nowrap"
        >
          {{Math.round(drawPreviewCoords.width)}} x
          {{Math.round(drawPreviewCoords.height)}}</span
        >
      </div>
    </div>
  </div>
</template>
